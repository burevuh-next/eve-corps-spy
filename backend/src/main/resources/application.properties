spring.application.name=backend
# Подключение к БД
spring.datasource.url=jdbc:postgresql://localhost:5432/evecorpesp_db
spring.datasource.username=evecorpesp_user
spring.datasource.password=secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate настройки
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ESI API настройки
eve.esi.base-url=https://esi.evetech.net
eve.esi.datasource=tranquility
eve.esi.user-agent=EVE-CorpEsp/1.0 (contact@example.com)

# Кеширование
spring.cache.type=simple
spring.redis.host=localhost
spring.redis.port=6379

# Rate limiting
resilience4j.ratelimiter.instances.esiRateLimiter.limitForPeriod=100
resilience4j.ratelimiter.instances.esiRateLimiter.limitRefreshPeriod=60s
resilience4j.ratelimiter.instances.esiRateLimiter.timeoutDuration=5s